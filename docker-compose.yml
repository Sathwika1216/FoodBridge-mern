services:
  backend:
    image: ghcr.io/sathwika1216/foodbridge-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "5000"

  frontend:
    image: ghcr.io/sathwika1216/foodbridge-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
